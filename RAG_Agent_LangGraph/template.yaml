AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  RAG Agent with LangGraph — Lambda + API Gateway HTTP API.
  Fast path: retrieve → grade → generate → deliver response immediately.
  Async path: EvaluatorFunction runs Layers 1–3 in the background without
  blocking the user, then stores results to DynamoDB and flags low-quality
  responses for human review. Layer 4 (user feedback) is handled via /feedback.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL:   INFO
        LLM_MODEL:   gpt-4o-mini
        JUDGE_MODEL: gpt-4o

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key

  S3Bucket:
    Type: String
    Description: S3 bucket that stores the FAISS index and raw documents

  IndexKey:
    Type: String
    Default: faiss_index/index.faiss
    Description: S3 key for the FAISS index file

  ChunksKey:
    Type: String
    Default: faiss_index/chunks.pkl
    Description: S3 key for the pickled chunk list

Resources:

  # ── DynamoDB: evaluation logs (Layers 1, 2, 3) ────────────────────────────
  EvaluationLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RAGEvaluationLogs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: response_id
          AttributeType: S
      KeySchema:
        - AttributeName: response_id
          KeyType: HASH

  # ── DynamoDB: user feedback (Layer 4) ─────────────────────────────────────
  UserFeedbackTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RAGUserFeedback
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: response_id
          AttributeType: S
      KeySchema:
        - AttributeName: response_id
          KeyType: HASH

  # ── IAM Role: main RAG function ───────────────────────────────────────────
  RAGAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"
        - PolicyName: DynamoDBFeedbackAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:UpdateItem]
                Resource: !GetAtt UserFeedbackTable.Arn
              - Effect: Allow
                Action: [dynamodb:UpdateItem]
                Resource: !GetAtt EvaluationLogsTable.Arn
        - PolicyName: InvokeEvaluator
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt EvaluatorFunction.Arn

  # ── IAM Role: evaluator function ─────────────────────────────────────────
  EvaluatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBEvalAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:UpdateItem]
                Resource:
                  - !GetAtt EvaluationLogsTable.Arn

  # ── Main RAG Lambda (fast path) ───────────────────────────────────────────
  RAGAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rag-agent-langgraph
      CodeUri: src/
      Handler: lambda_function.handler
      Role: !GetAtt RAGAgentRole.Arn
      Timeout: 60         # retrieve + grade + generate only — no evaluation blocking
      MemorySize: 512     # FAISS index + LangGraph overhead
      Environment:
        Variables:
          OPENAI_API_KEY:          !Ref OpenAIApiKey
          S3_BUCKET:               !Ref S3Bucket
          INDEX_KEY:               !Ref IndexKey
          CHUNKS_KEY:              !Ref ChunksKey
          TOP_K:                   "5"
          FEEDBACK_TABLE_NAME:     !Ref UserFeedbackTable
          EVAL_TABLE_NAME:         !Ref EvaluationLogsTable
          EVALUATOR_FUNCTION_NAME: !GetAtt EvaluatorFunction.Arn
      Events:
        QueryApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref RAGAgentApi
            Path: /query
            Method: POST
        FeedbackApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref RAGAgentApi
            Path: /feedback
            Method: POST
        HealthApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref RAGAgentApi
            Path: /health
            Method: GET

  # ── Evaluator Lambda (async background) ──────────────────────────────────
  EvaluatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rag-evaluator-langgraph
      CodeUri: src/
      Handler: evaluator_handler.handler
      Role: !GetAtt EvaluatorRole.Arn
      Timeout: 120        # up to 4 LLM calls (faithfulness, relevance, precision, judge)
      MemorySize: 256     # no FAISS — lightweight
      Environment:
        Variables:
          OPENAI_API_KEY:             !Ref OpenAIApiKey
          EVAL_TABLE_NAME:            !Ref EvaluationLogsTable
          THRESHOLD_FAITHFULNESS:     "0.7"
          THRESHOLD_ANSWER_RELEVANCE: "0.6"
          THRESHOLD_CONTEXT_PRECISION: "0.5"
          THRESHOLD_JUDGE_SCORE:      "3.0"

  # ── HTTP API Gateway ───────────────────────────────────────────────────────
  RAGAgentApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: rag-agent-langgraph-api
      CorsConfiguration:
        AllowOrigins:  ["*"]
        AllowMethods:  [GET, POST, OPTIONS]
        AllowHeaders:  [Content-Type, Authorization]

Outputs:
  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${RAGAgentApi}.execute-api.${AWS::Region}.amazonaws.com"

  RAGAgentFunctionArn:
    Description: Main RAG Lambda ARN
    Value: !GetAtt RAGAgentFunction.Arn

  EvaluatorFunctionArn:
    Description: Async evaluator Lambda ARN
    Value: !GetAtt EvaluatorFunction.Arn

  EvaluationLogsTable:
    Description: DynamoDB table for evaluation logs (Layers 1, 2, 3)
    Value: !Ref EvaluationLogsTable

  UserFeedbackTable:
    Description: DynamoDB table for user feedback (Layer 4)
    Value: !Ref UserFeedbackTable
